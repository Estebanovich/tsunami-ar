<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Tsunami AR — Feria de Ciencias</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: sans-serif;
      }
      #instructions {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 14px;
        text-align: center;
        z-index: 999;
        pointer-events: none;
      }
    </style>
    <!-- AR.js + A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <div id="instructions">Apunta la cámara al marcador Hiro</div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; antialias: true;"
    >
      <!-- Assets -->
      <a-assets>
        <video
          id="tsunami-video"
          src="tsunami.mp4"
          autoplay
          loop
          playsinline
          webkit-playsinline
          muted
          preload="auto"
        ></video>
      </a-assets>

      <!-- Marcador Hiro -->
      <a-marker preset="hiro">
        <!-- Plano con video del tsunami, centrado sobre el marcador -->
        <a-video
          src="#tsunami-video"
          width="1.8"
          height="1"
          rotation="-90 0 0"
          position="0 0.01 0"
        ></a-video>
      </a-marker>

      <!-- Cámara AR -->
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Reproducir video al detectar el marcador
      const marker = document.querySelector('a-marker');
      const video = document.getElementById('tsunami-video');
      const instructions = document.getElementById('instructions');

      marker.addEventListener('markerFound', () => {
        video.play().catch(() => {});
        instructions.style.display = 'none';
      });

      marker.addEventListener('markerLost', () => {
        instructions.style.display = 'block';
      });
    </script>
  </body>
</html>
