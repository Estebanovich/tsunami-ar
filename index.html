<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Tsunami AR — Feria de Ciencias</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: sans-serif;
      }
      #instructions {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 14px;
        text-align: center;
        z-index: 999;
        pointer-events: none;
      }
      #start-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        color: white;
        gap: 20px;
      }
      #start-overlay h2 {
        font-size: 22px;
        margin: 0;
      }
      #start-btn {
        background: #0066cc;
        color: white;
        border: none;
        border-radius: 30px;
        padding: 14px 36px;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
    <!-- AR.js + A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body>
    <!-- Overlay inicial: desbloquea el video con interacción del usuario -->
    <div id="start-overlay">
      <h2>Tsunami AR</h2>
      <button id="start-btn">Iniciar experiencia</button>
    </div>

    <div id="instructions">Apunta la cámara al marcador Hiro</div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; antialias: true;"
    >
      <!-- Assets -->
      <a-assets>
        <video
          id="tsunami-video"
          src="tsunami.mp4"
          autoplay
          loop
          playsinline
          webkit-playsinline
          muted
          preload="auto"
        ></video>
      </a-assets>

      <!-- Marcador Hiro -->
      <a-marker preset="hiro">
        <a-plane
          src="#tsunami-video"
          width="1.8"
          height="1"
          rotation="-90 0 0"
          position="0 0.01 0"
        ></a-plane>
      </a-marker>

      <!-- Cámara AR -->
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const marker = document.querySelector('a-marker');
      const video = document.getElementById('tsunami-video');
      const instructions = document.getElementById('instructions');
      const overlay = document.getElementById('start-overlay');
      const startBtn = document.getElementById('start-btn');

      // El botón desbloquea el autoplay en iOS/Android
      startBtn.addEventListener('click', () => {
        // Reproducir y pausar inmediatamente para desbloquear el contexto de audio/video
        video.play().then(() => {
          video.pause();
          video.currentTime = 0;
        }).catch(() => {});
        overlay.style.display = 'none';
      });

      marker.addEventListener('markerFound', () => {
        video.play().catch(() => {});
        instructions.style.display = 'none';
      });

      marker.addEventListener('markerLost', () => {
        video.pause();
        instructions.style.display = 'block';
      });
    </script>
  </body>
</html>
