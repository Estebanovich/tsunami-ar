<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Simulación Tsunami — Modelo de Aguas Someras 1D</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #cdd6e0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid #1e2a38;
    }
    header h1 {
      font-size: 17px;
      font-weight: 700;
      color: #e8f0f8;
      letter-spacing: -0.3px;
    }
    header p {
      font-size: 12px;
      color: #6a7f96;
      margin-top: 2px;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
      min-height: 220px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Stats bar */
    #stats {
      display: flex;
      gap: 0;
      border-top: 1px solid #1e2a38;
      border-bottom: 1px solid #1e2a38;
    }
    .stat {
      flex: 1;
      padding: 8px 12px;
      border-right: 1px solid #1e2a38;
      text-align: center;
    }
    .stat:last-child { border-right: none; }
    .stat-label { font-size: 10px; color: #6a7f96; letter-spacing: 0.5px; text-transform: uppercase; }
    .stat-value { font-size: 16px; font-weight: 700; margin-top: 1px; }
    #stat-time   .stat-value { color: #e8f0f8; }
    #stat-height .stat-value { color: #4fc3f7; }
    #stat-coast  .stat-value { color: #ff7043; }
    #stat-speed  .stat-value { color: #81c784; }
  #stat-cfl    .stat-value { color: #ffd54f; }

    /* Controls */
    #controls {
      padding: 14px 16px 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 24px;
    }

    .slider-group { display: flex; flex-direction: column; gap: 5px; }
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .slider-header label { font-size: 12px; color: #8b9ab0; font-weight: 600; }
    .slider-header span  { font-size: 13px; color: #cdd6e0; font-weight: 700; }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #1e2a38;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #0066cc;
      cursor: pointer;
      border: 2px solid #1a3a5a;
    }
    input[type=range].orange::-webkit-slider-thumb { background: #ff7043; }
    input[type=range].green::-webkit-slider-thumb  { background: #81c784; }
    input[type=range].teal::-webkit-slider-thumb   { background: #26c6da; }

    /* Buttons */
    #buttons {
      padding: 0 16px 20px;
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.75; }
    #btn-play  { background: #0066cc; color: white; }
    #btn-reset { background: #1e2a38; color: #8b9ab0; }

    /* Canvas labels (drawn via JS, but we style a few overlays) */
    #canvas-labels {
      position: absolute;
      top: 0; left: 0; right: 0;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      padding: 8px 12px;
    }
    .clabel {
      font-size: 11px;
      color: #4a6a80;
      background: rgba(13,17,23,0.6);
      padding: 2px 6px;
      border-radius: 4px;
    }

    @media (max-width: 480px) {
      #controls { grid-template-columns: 1fr; gap: 10px; }
      .stat-value { font-size: 14px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Simulación de Tsunami — Aguas Someras 1D</h1>
  <p>Ecuaciones de Saint-Venant · Esquema leapfrog · Batimetría variable</p>
</header>

<div id="canvas-wrap">
  <canvas id="sim-canvas"></canvas>
  <div id="canvas-labels">
    <span class="clabel">Océano abierto →</span>
    <span class="clabel">← Costa</span>
  </div>
</div>

<div id="stats">
  <div class="stat" id="stat-time">
    <div class="stat-label">Tiempo</div>
    <div class="stat-value" id="val-time">0:00</div>
  </div>
  <div class="stat" id="stat-height">
    <div class="stat-label">Altura máx.</div>
    <div class="stat-value" id="val-height">— m</div>
  </div>
  <div class="stat" id="stat-coast">
    <div class="stat-label">Altura en costa</div>
    <div class="stat-value" id="val-coast">— m</div>
  </div>
  <div class="stat" id="stat-speed">
    <div class="stat-label">Vel. ola</div>
    <div class="stat-value" id="val-speed">— km/h</div>
  </div>
  <div class="stat" id="stat-cfl">
    <div class="stat-label">CFL</div>
    <div class="stat-value" id="val-cfl">—</div>
  </div>
</div>

<div id="controls">
  <div class="slider-group">
    <div class="slider-header">
      <label>Amplitud inicial</label>
      <span id="lbl-amp">3 m</span>
    </div>
    <input type="range" id="sl-amp" class="orange" min="0.5" max="12" step="0.5" value="3" />
  </div>

  <div class="slider-group">
    <div class="slider-header">
      <label>Profundidad del océano</label>
      <span id="lbl-depth">50 m</span>
    </div>
    <input type="range" id="sl-depth" min="10" max="200" step="5" value="50" />
  </div>

  <div class="slider-group">
    <div class="slider-header">
      <label>Pendiente de la costa</label>
      <span id="lbl-slope">media</span>
    </div>
    <input type="range" id="sl-slope" class="teal" min="1" max="5" step="1" value="3" />
  </div>

  <div class="slider-group">
    <div class="slider-header">
      <label>Velocidad de simulación</label>
      <span id="lbl-speed">×5</span>
    </div>
    <input type="range" id="sl-simspeed" class="green" min="1" max="15" step="1" value="5" />
  </div>
</div>

<div id="buttons">
  <button id="btn-play">▶ Iniciar</button>
  <button id="btn-reset">↺ Reiniciar</button>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const N_CELLS    = 400;
const DX         = 150;       // m → 60 km domain
const g          = 9.81;
const H_MIN      = 0.5;       // numerical floor — evita sqrt(0) y CFL infinito
const SPONGE_N   = 60;        // celdas de esponja izquierda
const SPONGE_R   = 40;        // celdas de esponja derecha (absorbe reflexión)
const ASSELIN    = 0.05;      // filtro Asselin — suprime modo computacional leapfrog
const CFL_MAX    = 0.90;      // margen de seguridad CFL
const X_SRC_FRAC = 0.10;     // fuente al 10% del dominio

// Slope presets: shelfFrac = fraction of domain that is flat shelf
// (1 - shelfFrac) is the beach slope zone
const SLOPE_PRESETS = [0.70, 0.63, 0.55, 0.45, 0.33];
const SLOPE_LABELS  = ['muy suave', 'suave', 'media', 'empinada', 'muy empinada'];

// ── Sim state ─────────────────────────────────────────────────────────────────
let sim = null;
let running = false;
let rafId  = null;
let stepsPerFrame = 5;

let P = { amp: 3, hDeep: 50, shelfFrac: 0.55 };

// ── Physics helpers ───────────────────────────────────────────────────────────
function makeBathy(hDeep, shelfFrac) {
  const H = new Float64Array(N_CELLS);
  const shelfEnd = Math.round(shelfFrac * (N_CELLS - 1));
  for (let i = 0; i < N_CELLS; i++) {
    if (i <= shelfEnd) {
      H[i] = hDeep;
    } else {
      const frac = (i - shelfEnd) / (N_CELLS - 1 - shelfEnd);
      H[i] = Math.max(hDeep * (1 - frac), H_MIN);
    }
  }
  return H;
}

function makeHFace(H) {
  const Hf = new Float64Array(N_CELLS + 1);
  Hf[0] = H[0];
  for (let i = 1; i < N_CELLS; i++) Hf[i] = 0.5 * (H[i - 1] + H[i]);
  Hf[N_CELLS] = H[N_CELLS - 1];
  return Hf;
}

function initSim() {
  const H  = makeBathy(P.hDeep, P.shelfFrac);
  const Hf = makeHFace(H);

  // DT basado en c_max REAL del dominio (incluye celdas someras)
  const c_max = Math.sqrt(g * Math.max(...H));
  const DT    = CFL_MAX * DX / c_max;
  const CFL   = c_max * DT / DX;  // debe ser ≤ 1

  // Tiempo de cruce del dominio → auto-reset a las 2.5 travesías
  const t_cross   = (N_CELLS * DX) / c_max;
  const t_autoreset = 2.5 * t_cross;

  const x0  = X_SRC_FRAC * (N_CELLS - 1) * DX;
  const sig = 2200; // m

  const h_ic = new Float64Array(N_CELLS);
  const u_ic = new Float64Array(N_CELLS + 1);

  for (let i = 0; i < N_CELLS; i++) {
    const xi = i * DX;
    h_ic[i] = P.amp * Math.exp(-0.5 * ((xi - x0) / sig) ** 2);
  }
  for (let i = 1; i < N_CELLS; i++) {
    const xi = i * DX;
    u_ic[i] = P.amp * Math.exp(-0.5 * ((xi - x0) / sig) ** 2)
              * Math.sqrt(g / Math.max(Hf[i], H_MIN));
  }

  // Esponja izquierda (absorbe reflexiones del océano abierto)
  const sh = new Float64Array(N_CELLS).fill(1);
  const su = new Float64Array(N_CELLS + 1).fill(1);
  for (let i = 0; i < SPONGE_N; i++) {
    const v = i / SPONGE_N;
    sh[i] = v; su[i] = v;
  }
  // Esponja derecha (absorbe la ola reflejada en la costa)
  for (let i = 0; i < SPONGE_R; i++) {
    const v = i / SPONGE_R;
    const idx  = N_CELLS - 1 - i;
    const idxu = N_CELLS - i;
    sh[idx]  = Math.min(sh[idx],  v);
    su[idxu] = Math.min(su[idxu], v);
  }

  sim = {
    H, Hf, DT, CFL, t_autoreset, sh, su,
    h0: h_ic.slice(), h1: h_ic.slice(), h2: new Float64Array(N_CELLS),
    u0: u_ic.slice(), u1: u_ic.slice(), u2: new Float64Array(N_CELLS + 1),
    t: 0, stepN: 0,
  };
}

function stepSim(s, nSteps) {
  const { H, Hf, DT, sh, su } = s;

  for (let iter = 0; iter < nSteps; iter++) {
    // Right wall (coast)
    s.u1[N_CELLS] = 0;
    s.u2[N_CELLS] = 0;

    // Left: Sommerfeld radiation
    const c0 = Math.sqrt(g * H[0]);
    const r  = c0 * DT / DX;
    s.u1[0] = s.u1[1] + r * (s.u0[1] - s.u1[1]);

    const alpha = s.stepN === 0 ? DT / DX : 2 * DT / DX;

    for (let i = 1; i < N_CELLS; i++)
      s.u2[i] = s.u0[i] - g * alpha * (s.h1[i] - s.h1[i - 1]);

    for (let i = 0; i < N_CELLS; i++)
      s.h2[i] = s.h0[i] - alpha * (Hf[i + 1] * s.u1[i + 1] - Hf[i] * s.u1[i]);

    for (let i = 0; i < N_CELLS; i++)     s.h2[i] *= sh[i];
    for (let i = 0; i <= N_CELLS; i++)    s.u2[i] *= su[i];

    if (s.stepN > 0) {
      for (let i = 1; i < N_CELLS; i++)
        s.u1[i] += ASSELIN * (s.u0[i] - 2 * s.u1[i] + s.u2[i]);
      for (let i = 0; i < N_CELLS; i++)
        s.h1[i] += ASSELIN * (s.h0[i] - 2 * s.h1[i] + s.h2[i]);
    }

    s.h0.set(s.h1); s.h1.set(s.h2);
    s.u0.set(s.u1); s.u1.set(s.u2);

    s.t += DT;
    s.stepN++;
  }
}

// ── Rendering ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('sim-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth  * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  if (sim) render();
}

function render() {
  const W  = canvas.width;
  const CH = canvas.height;
  const { H, h1 } = sim;

  const yMin = -P.hDeep * 1.2;
  const yMax = Math.max(P.amp * 5, 3);

  const xMap = i => (i / (N_CELLS - 1)) * W;
  const yMap = y => CH - ((y - yMin) / (yMax - yMin)) * CH;

  // Background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, CH);

  // Shelf-break line
  const sbX = xMap(Math.round(P.shelfFrac * (N_CELLS - 1)));
  ctx.save();
  ctx.setLineDash([6, 5]);
  ctx.beginPath();
  ctx.moveTo(sbX, 0); ctx.lineTo(sbX, CH);
  ctx.strokeStyle = '#2a3d50'; ctx.lineWidth = 1 * devicePixelRatio;
  ctx.stroke();
  ctx.restore();

  // Depth annotation
  ctx.fillStyle = '#3a5a70';
  ctx.font = `${10 * devicePixelRatio}px sans-serif`;
  ctx.fillText(`prof. ${P.hDeep} m`, 8 * devicePixelRatio, yMap(-P.hDeep * 0.5));

  // Seabed fill
  ctx.beginPath();
  ctx.moveTo(xMap(0), yMap(-H[0]));
  for (let i = 1; i < N_CELLS; i++) ctx.lineTo(xMap(i), yMap(-H[i]));
  ctx.lineTo(W, CH); ctx.lineTo(0, CH);
  ctx.closePath();
  ctx.fillStyle = '#3a2a1a';
  ctx.fill();

  // Seabed line
  ctx.beginPath();
  ctx.moveTo(xMap(0), yMap(-H[0]));
  for (let i = 1; i < N_CELLS; i++) ctx.lineTo(xMap(i), yMap(-H[i]));
  ctx.strokeStyle = '#7a5a3a'; ctx.lineWidth = 1.5 * devicePixelRatio;
  ctx.stroke();

  // MSL
  ctx.save();
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(0, yMap(0)); ctx.lineTo(W, yMap(0));
  ctx.strokeStyle = '#1e3a4a'; ctx.lineWidth = devicePixelRatio;
  ctx.stroke();
  ctx.restore();

  // Water fill (gradient: deep blue → lighter near surface)
  const grad = ctx.createLinearGradient(0, yMap(yMax * 0.3), 0, yMap(yMin));
  grad.addColorStop(0, 'rgba(79,195,247,0.15)');
  grad.addColorStop(1, 'rgba(10,40,80,0.80)');

  ctx.beginPath();
  ctx.moveTo(xMap(0), yMap(-H[0]));
  for (let i = 1; i < N_CELLS; i++) ctx.lineTo(xMap(i), yMap(-H[i]));
  for (let i = N_CELLS - 1; i >= 0; i--) ctx.lineTo(xMap(i), yMap(h1[i]));
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Water surface — color based on max amplitude
  const hMax = Math.max(...h1);
  const ratio = Math.min(hMax / (P.amp * 3), 1);
  const r = Math.round(79  + ratio * (255 - 79));
  const g2 = Math.round(195 + ratio * (112 - 195));
  const b  = Math.round(247 + ratio * (34  - 247));

  ctx.beginPath();
  ctx.moveTo(xMap(0), yMap(h1[0]));
  for (let i = 1; i < N_CELLS; i++) ctx.lineTo(xMap(i), yMap(h1[i]));
  ctx.strokeStyle = `rgb(${r},${g2},${b})`;
  ctx.lineWidth = 2.5 * devicePixelRatio;
  ctx.stroke();

  // Coast marker
  ctx.fillStyle = '#ff7043';
  ctx.font = `bold ${10 * devicePixelRatio}px sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText('↑ costa', W - 6 * devicePixelRatio, yMap(0) - 6 * devicePixelRatio);
  ctx.textAlign = 'left';
}

// ── Stats update ──────────────────────────────────────────────────────────────
function updateStats() {
  const { h1, t } = sim;
  const mins = Math.floor(t / 60);
  const secs = Math.floor(t % 60).toString().padStart(2, '0');
  document.getElementById('val-time').textContent   = `${mins}:${secs}`;
  document.getElementById('val-height').textContent = `${Math.max(...h1).toFixed(2)} m`;
  document.getElementById('val-coast').textContent  = `${Math.abs(h1[N_CELLS - 1]).toFixed(2)} m`;

  const waveSpeed = Math.sqrt(g * P.hDeep) * 3.6;
  document.getElementById('val-speed').textContent = `${waveSpeed.toFixed(0)} km/h`;
  document.getElementById('val-cfl').textContent   = sim.CFL.toFixed(3);
}

// ── Animation loop ────────────────────────────────────────────────────────────
function loop() {
  stepSim(sim, stepsPerFrame);

  // Chequeo de estabilidad: NaN o divergencia → auto-reset
  const hMax = Math.max(...sim.h1);
  const isUnstable = !isFinite(hMax) || hMax > P.amp * 50;
  const isExpired  = sim.t > sim.t_autoreset;

  if (isUnstable || isExpired) {
    initSim();
  }

  render();
  updateStats();
  rafId = requestAnimationFrame(loop);
}

// ── UI ────────────────────────────────────────────────────────────────────────
const btnPlay  = document.getElementById('btn-play');
const btnReset = document.getElementById('btn-reset');

btnPlay.addEventListener('click', () => {
  if (!sim) { initSim(); render(); }
  running = !running;
  if (running) {
    btnPlay.textContent = '⏸ Pausar';
    rafId = requestAnimationFrame(loop);
  } else {
    btnPlay.textContent = '▶ Continuar';
    cancelAnimationFrame(rafId);
  }
});

btnReset.addEventListener('click', () => {
  running = false;
  cancelAnimationFrame(rafId);
  btnPlay.textContent = '▶ Iniciar';
  initSim();
  render();
  updateStats();
});

// Sliders
document.getElementById('sl-amp').addEventListener('input', function() {
  P.amp = +this.value;
  document.getElementById('lbl-amp').textContent = `${P.amp} m`;
  resetIfStopped();
});

document.getElementById('sl-depth').addEventListener('input', function() {
  P.hDeep = +this.value;
  document.getElementById('lbl-depth').textContent = `${P.hDeep} m`;
  resetIfStopped();
});

document.getElementById('sl-slope').addEventListener('input', function() {
  const idx = +this.value - 1;
  P.shelfFrac = SLOPE_PRESETS[idx];
  document.getElementById('lbl-slope').textContent = SLOPE_LABELS[idx];
  resetIfStopped();
});

document.getElementById('sl-simspeed').addEventListener('input', function() {
  stepsPerFrame = +this.value;
  document.getElementById('lbl-speed').textContent = `×${stepsPerFrame}`;
});

function resetIfStopped() {
  if (!running) {
    initSim();
    render();
    updateStats();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
initSim();
render();
updateStats();
</script>
</body>
</html>
